<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Benchmark Review</title>
<style>
  :root { --bg: #1a1a2e; --surface: #16213e; --accent: #0f3460; --text: #e0e0e0; --pass: #4caf50; --fail: #f44336; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
  h1 { margin-bottom: 1.5rem; font-size: 1.6rem; }
  .eval-card { background: var(--surface); border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
  .eval-header { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
  .eval-prompt { background: var(--accent); border-radius: 4px; padding: 0.8rem; margin-bottom: 1rem; white-space: pre-wrap; font-size: 0.9rem; }
  .outputs { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .output-panel { background: var(--bg); border-radius: 4px; padding: 1rem; }
  .output-panel h3 { font-size: 0.9rem; margin-bottom: 0.5rem; color: #aaa; }
  .output-text { white-space: pre-wrap; font-size: 0.85rem; max-height: 400px; overflow-y: auto; }
  .grading { margin-top: 0.5rem; }
  .assertion { display: flex; align-items: baseline; gap: 0.5rem; margin: 0.3rem 0; font-size: 0.85rem; }
  .badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.75rem; font-weight: 600; }
  .badge-pass { background: var(--pass); color: #fff; }
  .badge-fail { background: var(--fail); color: #fff; }
  .feedback-form { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--accent); }
  .feedback-form label { font-size: 0.85rem; }
  .feedback-form select, .feedback-form input, .feedback-form textarea { background: var(--bg); color: var(--text); border: 1px solid var(--accent); border-radius: 4px; padding: 0.4rem; font-size: 0.85rem; }
  .feedback-form textarea { width: 100%; min-height: 60px; }
  .score-group { display: flex; gap: 0.5rem; align-items: center; }
  button { background: var(--accent); color: var(--text); border: none; border-radius: 4px; padding: 0.5rem 1.2rem; cursor: pointer; font-size: 0.9rem; }
  button:hover { background: #1a4a8a; }
  #submit-all { margin-top: 1rem; font-size: 1rem; padding: 0.7rem 2rem; }
  .status { margin-top: 1rem; font-size: 0.9rem; }
</style>
</head>
<body>
<h1 id="title">Benchmark Review</h1>
<div id="evals"></div>
<button id="submit-all" onclick="submitAll()">Submit All Feedback</button>
<div id="status" class="status"></div>

<script>
let DATA = null;

async function init() {
  const resp = await fetch('/api/data');
  DATA = await resp.json();
  document.getElementById('title').textContent = `Review: ${DATA.suite_name}`;
  renderEvals();
}

function renderEvals() {
  const container = document.getElementById('evals');
  // Blind: randomize label assignment per eval
  DATA.evals.forEach(ev => {
    const card = document.createElement('div');
    card.className = 'eval-card';
    card.dataset.evalId = ev.id;

    // Randomly assign A/B labels to configs for blind review
    const configNames = Object.keys(ev.outputs);
    const shuffled = [...configNames].sort(() => Math.random() - 0.5);
    card.dataset.mapping = JSON.stringify(Object.fromEntries(
      shuffled.map((name, i) => [String.fromCharCode(65 + i), name])
    ));

    let html = `<div class="eval-header">Eval: ${ev.id}</div>`;
    html += `<div class="eval-prompt">${escHtml(ev.prompt)}</div>`;
    html += '<div class="outputs">';

    shuffled.forEach((name, i) => {
      const label = String.fromCharCode(65 + i);
      const out = ev.outputs[name];
      const grading = ev.gradings?.[name];
      html += `<div class="output-panel">`;
      html += `<h3>Output ${label}</h3>`;
      html += `<div class="output-text">${escHtml(out.final_text || out.error || '(no output)')}</div>`;
      if (grading?.expectations) {
        html += '<div class="grading">';
        grading.expectations.forEach(exp => {
          const cls = exp.passed ? 'badge-pass' : 'badge-fail';
          const lbl = exp.passed ? 'PASS' : 'FAIL';
          html += `<div class="assertion"><span class="badge ${cls}">${lbl}</span> ${escHtml(exp.text)}</div>`;
        });
        html += '</div>';
      }
      html += '</div>';
    });

    html += '</div>';

    // Feedback form
    const options = shuffled.map((_, i) => String.fromCharCode(65 + i));
    html += '<div class="feedback-form">';
    html += `<label>Preferred: <select class="pref-select">
      <option value="">--</option>
      ${options.map(o => `<option value="${o}">Output ${o}</option>`).join('')}
      <option value="tie">Tie</option>
    </select></label>`;
    options.forEach(o => {
      html += `<div class="score-group"><label>Score ${o}:</label><input type="number" class="score-input" data-label="${o}" min="1" max="5" placeholder="1-5" style="width:60px"></div>`;
    });
    html += `<textarea class="comment-input" placeholder="Optional comment..."></textarea>`;
    html += '</div>';

    card.innerHTML = html;
    container.appendChild(card);
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function submitAll() {
  const feedbacks = [];
  document.querySelectorAll('.eval-card').forEach(card => {
    const evalId = card.dataset.evalId;
    const mapping = JSON.parse(card.dataset.mapping);
    const prefLabel = card.querySelector('.pref-select').value;
    const comment = card.querySelector('.comment-input').value;
    const scores = {};
    card.querySelectorAll('.score-input').forEach(inp => {
      const label = inp.dataset.label;
      const realName = mapping[label];
      if (inp.value) scores[realName] = parseInt(inp.value);
    });
    let preferred = '';
    if (prefLabel === 'tie') preferred = 'tie';
    else if (prefLabel && mapping[prefLabel]) preferred = mapping[prefLabel];

    if (preferred || Object.keys(scores).length || comment) {
      feedbacks.push({
        eval_id: evalId,
        preferred,
        scores,
        comment,
        reviewer: '',
        timestamp: new Date().toISOString(),
      });
    }
  });

  const resp = await fetch('/api/feedback', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(feedbacks),
  });
  const result = await resp.json();
  document.getElementById('status').textContent = result.message || 'Submitted!';
}

init();
</script>
</body>
</html>
